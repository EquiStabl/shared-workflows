name: Nx CI

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        type: string
        default: '24'
      nx_targets:
        description: 'Nx targets to run (space-separated)'
        type: string
        default: 'lint test build'
      prisma:
        description: 'Run prisma generate before targets'
        type: boolean
        default: false
      env_file:
        description: 'Content to write to .env file'
        type: string
        default: ''
      affected:
        description: 'Run only on Nx affected projects (vs all projects)'
        type: boolean
        default: false
      runner:
        description: 'Runner label (ubuntu-latest or a self-hosted scale set, e.g. equistabl-runners)'
        type: string
        default: 'ubuntu-latest'

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - run: npm ci

      - name: Create env file
        if: inputs.env_file != ''
        env:
          ENV_CONTENT: ${{ inputs.env_file }}
        run: echo "$ENV_CONTENT" >> .env

      - name: Generate Prisma Client
        if: inputs.prisma
        run: npx prisma generate

      - name: Derive Nx SHAs (affected)
        if: inputs.affected
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0

      - name: Run Nx targets (affected)
        if: inputs.affected
        run: npx nx affected -t ${{ inputs.nx_targets }}
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      - name: Run Nx targets (all)
        if: ${{ !inputs.affected }}
        run: npx nx run-many -t ${{ inputs.nx_targets }}
        env:
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

      - name: Nx fix-ci
        run: npx nx fix-ci
        if: always()
