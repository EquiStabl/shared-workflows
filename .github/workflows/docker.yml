name: Docker Build & Deploy

on:
  workflow_call:
    inputs:
      images:
        description: 'JSON array of images to build, e.g. [{"name":"api","dockerfile":"apps/api/Dockerfile"}]'
        type: string
        required: true
      affected:
        description: 'Build only Nx affected images (push to default branch only; releases/dispatch always build all). Image name must match the Nx project name.'
        type: boolean
        default: false
      node_version:
        description: 'Node.js version (used to compute affected projects)'
        type: string
        default: '24'

jobs:
  # Resolves the list of images to build/deploy. With affected enabled (and only
  # on a branch push), it filters `images` down to the Nx affected apps; otherwise
  # it passes the full list through unchanged.
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.affected.outputs.images || steps.passthrough.outputs.images }}
    steps:
      - name: Pass through all images
        id: passthrough
        if: ${{ !inputs.affected || github.event_name != 'push' }}
        env:
          IMAGES: ${{ inputs.images }}
        run: echo "images=$(jq -c . <<< "$IMAGES")" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ inputs.affected && github.event_name == 'push' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Node
        if: ${{ inputs.affected && github.event_name == 'push' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install deps
        if: ${{ inputs.affected && github.event_name == 'push' }}
        run: npm ci

      - name: Derive Nx SHAs
        if: ${{ inputs.affected && github.event_name == 'push' }}
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0

      - name: Compute affected images
        id: affected
        if: ${{ inputs.affected && github.event_name == 'push' }}
        env:
          IMAGES: ${{ inputs.images }}
          NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
        run: |
          APPS=$(npx nx show projects --affected --type app --json)
          echo "Affected apps: $APPS"
          FILTERED=$(jq -c --argjson aff "$APPS" '[ .[] | select(.name as $n | $aff | index($n) != null) ]' <<< "$IMAGES")
          echo "Building images: $FILTERED"
          echo "images=$FILTERED" >> "$GITHUB_OUTPUT"

  build:
    if: ${{ (vars.DOCKER_MANUAL_ONLY != 'true' || github.event_name == 'workflow_dispatch') && needs.resolve.outputs.images != '[]' }}
    needs: resolve
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJson(needs.resolve.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ env.REPO }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=raw,value=${{ github.ref_name }}-${{ github.run_id }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [resolve, build]
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Update image tags
        working-directory: gitops/apps/${{ github.event.repository.name }}/overlays/dev
        env:
          IMAGES: ${{ needs.resolve.outputs.images }}
        run: |
          TAG="${GITHUB_REF_NAME}-${GITHUB_RUN_ID}"
          REPO="${GITHUB_REPOSITORY,,}"
          CMD="kustomize edit set image"
          for IMAGE in $(echo "$IMAGES" | jq -r '.[].name'); do
            CMD="$CMD ghcr.io/${REPO}/${IMAGE}=ghcr.io/${REPO}/${IMAGE}:${TAG}"
          done
          eval $CMD

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy(dev): ${{ github.event.repository.name }} images to ${GITHUB_REF_NAME}-${GITHUB_RUN_ID}"
          git push

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ github.event.repository.name }} deployed to dev :rocket:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.event.repository.name }} deployed to dev* :rocket:\nTag `${{ github.ref_name }}-${{ github.run_id }}` pushed to GitOps (dev overlay).\nContains `${{ github.event.head_commit.message }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [resolve, build]
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Update image tags
        working-directory: gitops/apps/${{ github.event.repository.name }}/overlays/prod
        env:
          IMAGES: ${{ needs.resolve.outputs.images }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO="${GITHUB_REPOSITORY,,}"
          CMD="kustomize edit set image"
          for IMAGE in $(echo "$IMAGES" | jq -r '.[].name'); do
            CMD="$CMD ghcr.io/${REPO}/${IMAGE}=ghcr.io/${REPO}/${IMAGE}:${VERSION}"
          done
          eval $CMD

      - name: Commit and push
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "deploy(prod): ${{ github.event.repository.name }} images to ${GITHUB_REF_NAME}"
          git push

      - name: Notify Slack
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ github.event.repository.name }} deployed to prod :white_check_mark:",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ github.event.repository.name }} deployed to prod* :white_check_mark:\nVersion `${{ github.ref_name }}` pushed to GitOps (prod overlay).\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>"
                  }
                }
              ]
            }
