# CI/CD — single file to copy into your project at .github/workflows/main.yml
# Replace <owner> with your GitHub username or organization
# Adjust the inputs below to match your project

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  ci:
    uses: <owner>/shared-workflows/.github/workflows/nx-ci.yml@main
    with:
      node_version: "20"
      nx_targets: "lint test build"
      # prisma: true
      # env_file: "DATABASE_URL=postgresql://user:pass@localhost:5432/dummy"
    secrets: inherit

  docker:
    if: github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: ci
    uses: <owner>/shared-workflows/.github/workflows/docker.yml@main
    with:
      images: '[{"name": "api", "dockerfile": "apps/api/Dockerfile"}]'
    secrets: inherit
